<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splat Audio Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    .controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1;
      display: flex;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      padding: 10px 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: progress;
    }
  </style>
</head>

<body>
  <div class="controls">
    <button id="audio-toggle" type="button">Play Audio</button>
    <button id="audio-visibility-toggle" type="button">Hide Audio Mesh</button>
  </div>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
  }
}
  </script>

  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh, SparkControls, utils } from "@sparkjsdev/spark";

    const toggleButton = document.getElementById("audio-toggle");
    const visibilityToggleButton = document.getElementById("audio-visibility-toggle");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

    const renderer = new THREE.WebGLRenderer();
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const cameraWorldPosition = new THREE.Vector3();

    const localFrame = new THREE.Group();
    scene.add(localFrame);
    localFrame.add(camera);

    const listener = new THREE.AudioListener();
    camera.add(listener);

    const spark = new SparkRenderer({
      renderer,
      maxStdDev: Math.sqrt(5),
    });
    scene.add(spark);

    const controls = new SparkControls({
      canvas: renderer.domElement,
    });
    controls.pointerControls.reverseRotate = utils.isMobile();
    controls.pointerControls.rotateSpeed *= 2.0;
    controls.pointerControls.slideSpeed *= 0.75;

    const sceneData = await fetch("./scene.json").then((response) => response.json());

    for (const splat of sceneData.splats ?? []) {
      const splatMesh = new SplatMesh({
        url: `./${splat.filename}`,
        lod: true,
      });

      splatMesh.position.fromArray(splat.transform?.translation ?? [0, 0, 0]);
      splatMesh.quaternion.fromArray(splat.transform?.quaternion ?? [0, 0, 0, 1]);

      const scale = splat.transform?.scale ?? 1;
      splatMesh.scale.set(scale, scale, scale);
      scene.add(splatMesh);
    }

    const audioLoader = new THREE.AudioLoader();

    async function addEmitter(position, url, volume, color) {
      const anchor = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 20, 20),
        new THREE.MeshBasicMaterial({
          color,
          wireframe: true,
        }),
      );
      anchor.position.set(...position);

      const audio = new THREE.PositionalAudio(listener);
      audio.setRefDistance(2);
      audio.setMaxDistance(16);
      audio.setRolloffFactor(1);
      audio.setLoop(true);
      audio.setVolume(volume);

      anchor.add(audio);
      scene.add(anchor);

      const buffer = await audioLoader.loadAsync(url);
      audio.setBuffer(buffer);

      return {
        anchor,
        audio,
      };
    }

    const emitters = await Promise.all([
      addEmitter([0.24656978419511813, 0.0668756835999589, -3.786995722825606], "./assets/audio/birds.mp3", 0.35, 0xa1b70d),
      addEmitter([-1.3179427394509902, -0.13402284789000768, 0.6756281962153219], "./assets/audio/waves.mp3", 0.7, 0xe89923),
    ]);
    let audioMeshesVisible = true;

    async function toggleAudio() {
      toggleButton.disabled = true;

      try {
        await listener.context.resume();

        const anyPlaying = emitters.some(({ audio }) => audio.isPlaying);
        for (const { audio } of emitters) {
          if (anyPlaying) {
            audio.pause();
          } else {
            audio.play();
          }
        }

        toggleButton.textContent = anyPlaying ? "Play Audio" : "Pause Audio";
      } finally {
        toggleButton.disabled = false;
      }
    }

    function toggleAudioMeshes() {
      audioMeshesVisible = !audioMeshesVisible;

      for (const { anchor } of emitters) {
        anchor.visible = audioMeshesVisible;
      }

      visibilityToggleButton.textContent = audioMeshesVisible ? "Hide Audio Mesh" : "Show Audio Mesh";
    }

    toggleButton.addEventListener("click", () => {
      void toggleAudio();
    });
    visibilityToggleButton.addEventListener("click", toggleAudioMeshes);

    renderer.domElement.addEventListener("click", () => {
      camera.getWorldPosition(cameraWorldPosition);
      const positionArray = [cameraWorldPosition.x, cameraWorldPosition.y, cameraWorldPosition.z];
      console.log("Camera position", {
        x: cameraWorldPosition.x,
        y: cameraWorldPosition.y,
        z: cameraWorldPosition.z,
      });
      console.log(positionArray);
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Bird Silhouettes ---
    function createBirdShape() {
      // Stylized bird: wings, body, tail
      const shape = new THREE.Shape();
      shape.moveTo(-0.4, 0.05); // left wing tip
      shape.quadraticCurveTo(-0.2, 0.18, 0, 0.08); // left wing curve to body
      shape.quadraticCurveTo(0.05, 0.1, 0.12, 0.18); // body to right wing base
      shape.quadraticCurveTo(0.25, 0.22, 0.4, 0.05); // right wing tip
      shape.quadraticCurveTo(0.18, 0.08, 0.08, 0.03); // right wing to body
      shape.lineTo(0.03, -0.01); // body to tail top
      shape.lineTo(0, -0.08); // tail tip
      shape.lineTo(-0.03, -0.01); // tail top to body
      shape.quadraticCurveTo(-0.08, 0.03, -0.4, 0.05); // close left wing
      return shape;
    }

    const birdMaterial = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.DoubleSide });
    const birdGeometry = new THREE.ShapeGeometry(createBirdShape());

    // Create two birds
    const bird1 = new THREE.Mesh(birdGeometry, birdMaterial);
    const bird2 = new THREE.Mesh(birdGeometry, birdMaterial);

    // Initial positions (above water, in the sky)
    bird1.position.set(-1, 1.5, -2);
    bird1.scale.set(1.2, 1.2, 1.2);
    bird2.position.set(1, 1.7, -2.5);
    bird2.scale.set(0.9, 0.9, 0.9);

    scene.add(bird1);
    scene.add(bird2);

    // Animate birds in the render loop
    let birdTime = 0;
    renderer.setAnimationLoop(() => {
      controls.update(localFrame, camera);

      // Animate birds: simple sine wave for flapping and flying
      birdTime += 0.01;
      bird1.position.x = -1 + Math.sin(birdTime) * 0.7;
      bird1.position.y = 1.5 + Math.sin(birdTime * 2) * 0.1;
      bird1.rotation.z = Math.sin(birdTime) * 0.2;

      bird2.position.x = 1 - Math.sin(birdTime * 0.8) * 0.6;
      bird2.position.y = 1.7 + Math.sin(birdTime * 1.7) * 0.12;
      bird2.rotation.z = -Math.sin(birdTime * 0.8) * 0.18;

      renderer.render(scene, camera);
    });
  </script>
</body>

</html>
